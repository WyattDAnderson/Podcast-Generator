name: "Podcast Generator"
author: Wyatt Anderson
description: "Generates a podcast feed from Yaml file"

runs:
  using: "docker"
  image: "Dockerfile"
branding: 
  icon: "git-branch"
  color: "red"
inputs:
  email:
    description: "commiters email"
    required: true
    default: ${{github.actor}} @localhost
  name:
    description: "commiters name"
    required: true
    default: ${{github.actor}}